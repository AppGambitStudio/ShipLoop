version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shiploop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shiploop
      POSTGRES_PASSWORD: shiploop_dev
      POSTGRES_DB: shiploop
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
